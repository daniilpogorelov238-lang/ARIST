<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARIST Messenger - Современный веб-мессенджер</title>
    <meta name="description" content="ARIST - современный веб-мессенджер с красивым дизайном и продвинутыми функциями">
    <meta name="keywords" content="мессенджер, чат, веб-приложение, общение">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>">
</head>
<body>
    <div class="messenger-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">A</div>
                    <div class="logo-text">ARIST</div>
                </div>
                <div class="search-box">
                    <input type="text" placeholder="Поиск контактов..." id="searchInput" aria-label="Поиск контактов">
                    <span class="search-icon">🔍</span>
                </div>
            </div>
            
            <div class="user-profile">
                <div class="avatar">
                    <span>Я</span>
                    <div class="online-indicator"></div>
                </div>
                <div class="user-info">
                    <div class="user-name">Пользователь</div>
                    <div class="user-status">В сети</div>
                </div>
            </div>

            <nav class="contacts-list" id="contactsList" aria-label="Список контактов">
                <!-- Contacts generated by JavaScript -->
            </nav>
        </aside>

        <!-- Chat Area -->
        <main class="chat-area" id="chatArea">
            <!-- Welcome Screen -->
            <div class="welcome-screen" id="welcomeScreen">
                <div class="welcome-content">
                    <div class="welcome-logo">
                        <div class="logo-animation">💬</div>
                    </div>
                    <div class="welcome-text">Добро пожаловать в ARIST</div>
                    <div class="welcome-subtext">Выберите контакт для начала общения</div>
                    <div class="welcome-features">
                        <div class="feature-item">
                            <span class="feature-icon">🚀</span>
                            <span>Быстрый обмен сообщениями</span>
                        </div>
                        <div class="feature-item">
                            <span class="feature-icon">🔒</span>
                            <span>Безопасное общение</span>
                        </div>
                        <div class="feature-item">
                            <span class="feature-icon">📱</span>
                            <span>Адаптивный дизайн</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Chat Screen -->
            <div id="chatScreen" style="display: none;">
                <header class="chat-header">
                    <button class="back-btn" id="backBtn" aria-label="Назад к контактам">
                        ←
                    </button>
                    <div class="chat-contact-avatar avatar" id="chatContactAvatar">
                        <span id="chatContactInitials"></span>
                        <div class="online-indicator"></div>
                    </div>
                    <div class="chat-contact-info">
                        <div class="chat-contact-name" id="chatContactName"></div>
                        <div class="chat-contact-status" id="chatContactStatus"></div>
                    </div>
                    <div class="chat-actions">
                        <button class="action-btn" title="Поиск в чате" aria-label="Поиск в чате">🔍</button>
                        <button class="action-btn" title="Аудиозвонок" aria-label="Аудиозвонок">📞</button>
                        <button class="action-btn" title="Видеозвонок" aria-label="Видеозвонок">📹</button>
                        <button class="action-btn" title="Дополнительно" aria-label="Меню">⋮</button>
                    </div>
                </header>

                <div class="messages-container" id="messagesContainer" aria-live="polite">
                    <!-- Messages generated by JavaScript -->
                </div>
                
                <div class="typing-indicator" id="typingIndicator" style="display: none;">
                    <div class="typing-dots">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                    Печатает...
                </div>

                <div class="message-input-area">
                    <button class="attachment-btn" title="Прикрепить файл" aria-label="Прикрепить файл">📎</button>
                    <textarea 
                        class="message-input" 
                        id="messageInput" 
                        placeholder="Введите сообщение..." 
                        rows="1"
                        aria-label="Введите сообщение"
                    ></textarea>
                    <button class="emoji-btn" title="Эмодзи" aria-label="Эмодзи">😊</button>
                    <button class="send-btn" id="sendBtn" aria-label="Отправить сообщение">➤</button>
                </div>
            </div>
        </main>
    </div>

    <script src="js/contacts.js"></script>
    <script src="js/messages.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
